<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browser History Stack Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">Stack ADT Demo</p>
        <h1>Browser History Simulator</h1>
        <p class="intro">Visit pages, move backward with stack pop/peek, and inspect history from top to bottom in real time.</p>
      </header>

      <section class="browser-frame" aria-label="Browser controls">
        <div class="window-controls">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
          <span class="window-title">In-memory navigation session</span>
        </div>
        <form id="visitForm" class="toolbar" autocomplete="off">
          <button id="backBtn" class="btn btn-ghost" type="button" disabled>&larr; Back</button>
          <label class="visually-hidden" for="addressInput">Address bar</label>
          <input id="addressInput" class="address" type="text" placeholder="Enter URL (example.com)" required>
          <button id="visitBtn" class="btn btn-primary" type="submit">Visit</button>
          <button id="clearBtn" class="btn btn-danger" type="button" disabled>Clear History</button>
        </form>
      </section>

      <section class="layout">
        <article class="card current-card">
          <div class="card-head">
            <p class="label">Current Page</p>
            <span class="chip">Top of stack</span>
          </div>
          <div id="currentPagePanel" class="current-page empty">
            <p id="currentPageText" class="current-url">No page open</p>
            <p id="currentPageSubtext" class="current-subtext">Visit a page to start the stack.</p>
          </div>
        </article>

        <aside class="card history-card">
          <div class="card-head">
            <p class="label">History Stack</p>
            <span id="stackSizeChip" class="chip chip-muted">0 pages</span>
          </div>
          <div id="historyList" class="history-list" aria-live="polite">
            <div class="history-empty">History is empty</div>
          </div>
        </aside>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script src="/static/script.js"></script>
  </body>
</html>
